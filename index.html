<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2820" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Robot Ruins" />
  <title>Robot Ruins — 2.5D FPS</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="spawn-curtain" class="hidden" aria-hidden="true">
    <p id="spawn-curtain-status" class="spawn-curtain-status pixel-text-host"></p>
  </div>

  <div id="overlay">
    <div id="loading-screen" class="hidden">
      <div class="menu-frame ui-slice-panel loading-frame">
        <h2 class="menu-heading pixel-text-host">Loading World</h2>
        <div class="loading-bar" aria-hidden="true">
          <div id="loading-bar-fill"></div>
        </div>
        <p id="loading-status" class="loading-status pixel-text-host">Preparing…</p>
      </div>
    </div>
    <div id="main-menu">
      <div class="menu-frame ui-slice-panel">
        <h1 class="pixel-text-host">Robot Ruins</h1>
        <p id="menu-subtitle" class="menu-subtitle pixel-text-host hidden"></p>
        <div class="menu-btn-stack">
          <button type="button" id="new-game-btn" class="ui-slice-button">New Game</button>
          <button type="button" id="load-game-btn" class="ui-slice-button hidden">Load Game</button>
        </div>
      </div>
    </div>
    <div id="pause-menu" class="hidden">
      <div class="menu-frame ui-slice-panel">
        <h2 class="menu-heading pixel-text-host">Paused</h2>
        <p id="pause-room-code" class="pause-room-code pixel-text-host hidden"></p>
        <div class="menu-btn-stack">
          <button type="button" id="resume-btn" class="ui-slice-button">Resume</button>
          <button type="button" id="save-game-btn" class="ui-slice-button">Save Game</button>
          <button type="button" id="back-to-menu-btn" class="ui-slice-button">Back to Menu</button>
        </div>
      </div>
    </div>
    <div id="confirm-dialog" class="hidden">
      <div class="menu-frame menu-frame--confirm ui-slice-panel">
        <p id="confirm-message" class="pixel-text-host"></p>
        <div class="menu-btn-row">
          <button type="button" id="confirm-yes-btn" class="ui-slice-button">Yes</button>
          <button type="button" id="confirm-no-btn" class="ui-slice-button">No</button>
        </div>
      </div>
    </div>
  </div>

  <div id="hud" class="hidden">
    <div id="hud-time">
      <span id="game-day" class="pixel-text-host">Day 1</span>
      <span id="game-clock" class="pixel-text-host">12:00</span>
    </div>
    <div id="hud-bottom-left">
      <div id="health-panel">
        <div id="health-bar-wrap">
          <div id="health-bar"></div>
          <span id="health-text" class="pixel-text-host">100</span>
        </div>
        <div id="pickup-status" class="pixel-text-host"></div>
        <div id="powerup-status" class="pixel-text-host"></div>
      </div>
    </div>
    <div id="interact-prompt" class="hidden pixel-text-host">RMB to open</div>
    <div id="weapon-panel">
      <div id="weapon-name" class="pixel-text-host">Glock</div>
      <div id="ammo-display">
        <canvas id="ammo-icon" width="32" height="32" aria-hidden="true"></canvas>
        <span id="ammo-current" class="pixel-text-host">12</span>
        <span class="ammo-sep pixel-text-host">/</span>
        <span id="ammo-reserve" class="pixel-text-host">36</span>
      </div>
      <div id="reload-indicator" class="hidden pixel-text-host">Reloading…</div>
    </div>
    <div id="kill-counter"><span id="zone-label" class="pixel-text-host">Base</span></div>
    <div id="wave-banner" class="hidden pixel-text-host"></div>
    <div id="damage-flash"></div>
  </div>

  <div id="inventory" class="hidden">
    <div class="inv-backdrop"></div>
    <div id="inventory-dual-wrap">
      <div id="inv-slide-track">
        <div id="craft-panel" class="ui-slice-panel">
          <img id="craft-panel-bg" src="assets/ui/crafting.png" alt="" draggable="false" />
          <div id="craft-panel-layout">
            <div id="inv-craft-picker" class="inv-craft-picker"></div>
            <div id="inv-craft-detail" class="inv-craft-detail">
              <div class="inv-craft-detail-row">
                <div id="inv-craft-cost-grid" class="inv-craft-cost-grid"></div>
                <button type="button" id="inv-craft-btn" class="inv-craft-btn ui-slice-button" aria-label="Craft"></button>
              </div>
            </div>
          </div>
        </div>
        <div id="inv-main-cluster">
            <div id="inv-inventory-cluster">
            <button type="button" id="inv-craft-toggle" class="inv-craft-toggle ui-slice-button pixel-text-host" aria-label="Toggle crafting" aria-expanded="false"></button>
            <div id="inventory-panel" class="ui-slice-panel">
            <img id="inventory-bg" src="assets/ui/inventory.png" alt="" draggable="false" />
            <div id="inventory-layout">
              <aside class="inv-left">
                <div class="inv-gear-columns">
                  <div id="inv-equipment-grid" class="inv-equipment-grid"></div>
                  <div id="inv-weapons-grid" class="inv-weapons-grid"></div>
                </div>
              </aside>
              <aside class="inv-right">
                <div id="inv-items-grid" class="inv-items-grid"></div>
              </aside>
            </div>
          </div>
          </div>
          <div id="chest-panel" class="ui-slice-panel hidden">
            <img id="chest-panel-bg" src="assets/ui/chest_inventory.png" alt="" draggable="false" />
            <div id="chest-panel-layout">
              <div id="inv-chest-grid" class="inv-chest-grid"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="mobile-controls" class="hidden">
    <button type="button" class="mb-btn mb-small mb-pause ui-slice-button" id="mb-pause" title="Pause">II</button>
    <div id="mobile-bottom-bar">
      <div id="mobile-move" class="joystick-wrap">
        <div class="joystick-base" id="move-joystick-base">
          <div class="joystick-knob" id="move-joystick-knob"></div>
        </div>
      </div>
      <div id="mobile-hotbar" class="mb-slot-group">
        <button type="button" class="mb-btn mb-hotbar ui-slice-button" id="mb-hand-0" title="Weapon 1">1</button>
        <button type="button" class="mb-btn mb-hotbar ui-slice-button" id="mb-hand-1" title="Weapon 2">2</button>
        <button type="button" class="mb-btn mb-hotbar ui-slice-button" id="mb-quick" title="Quick equip">3</button>
        <button type="button" class="mb-btn mb-hotbar ui-slice-button" id="mb-throw" title="Throwable">4</button>
      </div>
      <div id="mobile-actions">
        <button type="button" class="mb-btn mb-small ui-slice-button" id="mb-reload" title="Reload">R</button>
        <button type="button" class="mb-btn mb-small ui-slice-button" id="mb-interact" title="Interact">E</button>
        <button type="button" class="mb-btn mb-small ui-slice-button" id="mb-inventory" title="Inventory">INV</button>
        <div class="mobile-fire-cluster">
          <button type="button" class="mb-btn mb-small mb-autolock ui-slice-button" id="mb-autolock" title="Toggle enemy autolock">LK</button>
          <button type="button" class="mb-btn mb-fire ui-slice-button" id="mb-fire">FIRE</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/register-sw.js"></script>
  <script type="module" src="js/font-load.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
